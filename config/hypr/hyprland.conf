# #######################################################################################
# Hyprland Config - Optimized for v0.53+ Strict Syntax
# Audit Performed: January 2026
# #######################################################################################

# --- Monitors ---
# Using DP-2 with explicit refresh rate and position.
# monitorv2 block is available, but standard syntax remains valid.
monitor = DP-2, 2560x1440@143.86, 0x0, 1

# --- Autostart ---
# Essential daemons for system integration and aesthetic consistency.
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
exec-once = avizo-service
exec-once = swaybg -i /home/slumpy_666/.config/hypr/walls/copland.png -m fill
exec-once = wl-paste --watch cliphist store
exec-once = dunst -conf.config/dunst/dunstrc
exec-once = easyeffects --gapplication-service
exec-once = hypridle

# Source modular keybinds
source = ~/.config/hypr/bind.conf

# --- Environment Variables ---
# env syntax: KEY,VALUE (no quotes). Corrected XCURSOR_SIZE.
env = XCURSOR_SIZE,24
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb

# --- Input ---
input {
    kb_layout = us
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        disable_while_typing = true
        natural_scroll = true
    }

    # Sensitivity: 0 is neutral. Range [-1.0, 1.0].
    sensitivity = 0 
}

# --- Misc ---
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    # Required for proper fullscreen/master focus transitions in v0.53.
    on_focus_under_fullscreen = true 
    # Enable VFR to save power on static screens.
    vfr = true
}

# --- General ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Color syntax: rgba(hex) or legacy 0xARGB.
    col.active_border = rgba(2596beaa)
    col.inactive_border = 0xff313244
    
    layout = dwindle
}

# --- Decoration ---
decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    # Subcategory nesting is mandatory in v0.53.
    blur {
        enabled = true
        size = 8 # Reduced slightly for performance at 144Hz.
        passes = 2 # Increased to 2 for better smoothing.
        new_optimizations = true
        xray = true
        ignore_opacity = true
    }
    
    shadow {
        enabled = true
        ignore_window = true
        range = 4
        render_power = 2
        color = rgba(00000066) # Modern RRGGBBAA format.
    }
}

# --- Animations ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Layouts ---
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
    new_on_top = true
}

# --- Window Rules (Refactored for v0.53+ match: syntax) ---

# Firefox Rules: Multi-rule logic for PiP and Sharing Indicators.
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Media viewer)$
windowrule = float on, match:title ^(Firefox — Sharing Indicator)$
windowrule = move 0 0, match:title ^(Firefox — Sharing Indicator)$
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$

# Common Floating Windows: Aggregated regex match for efficiency.
windowrule = float on, match:class ^(file_progress|confirm|dialog|download|notification|error|splash|confirmreset)$
windowrule = float on, match:title ^(Open File|branchdialog)$
windowrule = float on, match:class ^(zoom|Lxappearance|ncmpcpp|viewnior|gucharmap|gnome-font|org.gnome.Settings|file-roller|nautilus|nemo|thunar|Pcmanfm|wdisplays|zathura|keepassxc)$
windowrule = float on, match:class (.*\.exe)

# Rofi: Explicit handling for the app launcher.
windowrule = float on, match:class ^(Rofi)$
windowrule = animation none, match:class ^(Rofi)$

# Audio / Volume Control: Precise sizing and positioning.
windowrule = float on, match:title ^(Volume Control)$
windowrule = size 800 600, match:title ^(Volume Control)$
windowrule = move 75 44%, match:title ^(Volume Control)$

# Media & Transmission
windowrule = float on, match:title ^(Transmission)$
windowrule = idle_inhibit focus, match:class ^(mpv)$

# Wlogout: Fullscreen overlay configuration.
windowrule = float on, match:class ^(wlogout)$
windowrule = fullscreen on, match:class ^(wlogout)$

# Opacity & Border Adjustments
windowrule = opacity 0.8 0.8, match:class ^(kitty)$
windowrule = border_size 0, match:float true
