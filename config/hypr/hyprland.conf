#
# Hyprland Config - Updated for v0.53+
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = DP-2, 2560x1440@143.86, 0x0, 1

# --- Autostart ---
exec-once = waybar
exec-once = hyprpaper
exec-once = wl-paste --watch cliphist store
exec-once = dunst -conf .config/dunst/dunstrc
exec-once = easyeffects --gapplication-service
exec-once = hypridle

# NOTE: You had both 'dunst' and 'mako' enabled. 
# Running two notification daemons causes conflicts. 
# I have commented out mako since you have a custom config for dunst above.
# exec-once = mako 

# Source a file (multi-file configs)
source = ~/.config/hypr/bind.conf

# --- Environment Variables ---
env = XCURSOR_SIZE,2
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# --- Input ---
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        disable_while_typing = true
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# --- General ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Colors
    col.active_border = rgba(2596beAA)
    col.inactive_border = 0xff313244
    
    layout = dwindle
}

# --- Decoration ---
decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    blur {
        enabled = yes
        size = 10
        passes = 1
        new_optimizations = on
    }
    
    # Shadow (Updated syntax for v0.53+)
    shadow {
        enabled = true
        ignore_window = true
        range = 4
        offset = 2 2
        render_power = 2
        color = 0x66000000
    }
}

# --- Animations ---
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Layouts ---
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
    new_on_top = true
}

gestures {
    # workspace_swipe = false
}

# --- Window Rules ---
# CRITICAL UPDATE: All rules converted to 'windowrulev2' 
# 'windowrule' (v1) does not support 'class:' or 'title:' selectors.

# Firefox Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = float, title:^(Media viewer)$
windowrulev2 = float, title:^(Firefox — Sharing Indicator)$
windowrulev2 = move 0 0, title:^(Firefox — Sharing Indicator)$
windowrulev2 = idleinhibit fullscreen, class:^(firefox)$

# Common Floating Windows
windowrulev2 = float, class:^(file_progress)$
windowrulev2 = float, class:^(confirm)$
windowrulev2 = float, class:^(dialog)$
windowrulev2 = float, class:^(download)$
windowrulev2 = float, class:^(notification)$
windowrulev2 = float, class:^(error)$
windowrulev2 = float, class:^(splash)$
windowrulev2 = float, class:^(confirmreset)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(branchdialog)$
windowrulev2 = float, class:^(zoom)$
windowrulev2 = float, class:^(Lxappearance)$
windowrulev2 = float, class:^(ncmpcpp)$
windowrulev2 = float, class:^(viewnior)$
windowrulev2 = float, class:^(gucharmap)$
windowrulev2 = float, class:^(gnome-font)$
windowrulev2 = float, class:^(org.gnome.Settings)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, class:^(nautilus)$
windowrulev2 = float, class:^(nemo)$
windowrulev2 = float, class:^(thunar)$
windowrulev2 = float, class:^(Pcmanfm)$
windowrulev2 = float, class:^(wdisplays)$
windowrulev2 = float, class:^(zathura)$
windowrulev2 = float, class:^(keepassxc)$
windowrulev2 = float, class:(.*\.exe)

# Rofi
windowrulev2 = float, class:^(Rofi)$
windowrulev2 = animation none, class:^(Rofi)$

# Audio / Volume Control
windowrulev2 = float, class:^(pavucontrol-qt)$
windowrulev2 = float, title:^(Volume Control)$
windowrulev2 = size 800 600, title:^(Volume Control)$
windowrulev2 = move 75 44%, title:^(Volume Control)$

# Transmission
windowrulev2 = float, title:^(Transmission)$

# MPV
windowrulev2 = idleinhibit focus, class:^(mpv)$

# Wlogout
windowrulev2 = float, class:^(wlogout)$
windowrulev2 = fullscreen, class:^(wlogout)$
windowrulev2 = float, title:^(wlogout)$
windowrulev2 = fullscreen, title:^(wlogout)$

# Opacity Rules
windowrulev2 = opacity 0.8 0.8, class:^(kitty)$

# No border on floating
windowrulev2 = bordersize 0, floating:1
# Example for floating all apps by default (commented out)
# windowrulev2 = float, class:.*
