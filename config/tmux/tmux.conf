# --- General Settings ---
# Enable mouse support (resizing, clicking, scrolling)
set -g mouse on

# Allow tmux to send text to the system clipboard via OSC 52
set -s set-clipboard on

# True color / 256 color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,alacritty:RGB,*:RGB"

# Reduce escape-time so vim/nvim feels snappy inside tmux
set -sg escape-time 10

# Larger scrollback buffer
set -g history-limit 50000

# --- Pane Navigation (Vim-style) ---
# Switch panes using Alt-hjkl WITHOUT the prefix key
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Split panes in the current working directory, with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Quality of Life ---
# Start window and pane numbering at 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Easy config reload shortcut
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Use Vi mode for copy mode (scrolling/searching)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Focus events for nvim autoread
set -g focus-events on

# --- Theme (portfolio blue: #4aafd4) ---
# Status bar
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#0d1520,fg=#ddeaf5"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#0d1520,bg=#4aafd4,bold] #S #[fg=#4aafd4,bg=#0d1520]  "
set -g status-right "#[fg=#7a9dba] %a %d %b #[fg=#4aafd4]│ #[fg=#ddeaf5]%H:%M "

# Windows
setw -g window-status-format "#[fg=#7a9dba,bg=#0d1520]  #I:#W  "
setw -g window-status-current-format "#[fg=#0d1520,bg=#4aafd4,bold]  #I:#W  "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#1c3050"
set -g pane-active-border-style "fg=#4aafd4"

# Messages / command prompt
set -g message-style "bg=#4aafd4,fg=#0d1520,bold"
set -g message-command-style "bg=#162538,fg=#4aafd4"

# Copy-mode highlight
setw -g mode-style "bg=#4aafd4,fg=#0d1520"
